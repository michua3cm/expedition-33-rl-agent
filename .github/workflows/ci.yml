# CI — runs on every push and pull request targeting dev or main.
#
# Jobs
# ----
# lint   : ruff check — catches import errors, undefined names, style issues
# test   : pytest     — runs the full test suite under tests/
#
# Why ubuntu-latest?
#   pywin32 is Windows-only and is declared with a sys_platform guard in
#   pyproject.toml, so it is skipped on Linux.  All tests mock the Windows
#   API layer (overlay_ui / win32gui) and never import it directly, so the
#   full suite runs cleanly on a Linux runner.

name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run ruff
        run: uv run ruff check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run pytest
        run: uv run pytest
