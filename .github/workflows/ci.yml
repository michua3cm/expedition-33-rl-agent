# CI — runs on every push and pull request targeting dev or main.
#
# Jobs
# ----
# lint   : ruff check — catches import errors, undefined names, style issues
# test   : pytest     — runs the full test suite under tests/
#
# Why ubuntu-latest?
#   pywin32 is Windows-only and is declared with a sys_platform guard in
#   pyproject.toml, so it is skipped on Linux.  win32api is lazy-imported
#   inside CalibrationApp._handle_input() so the module loads on Linux.
#   pynput requires an X server; xvfb-run provides a virtual display.

name: CI

on:
  push:
    branches: [dev, main, imitation-learning]
  pull_request:
    branches: [dev, main, imitation-learning]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff
        run: uv run ruff check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: xvfb-run uv run pytest
